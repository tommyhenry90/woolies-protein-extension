name: Release

# Push to the `deploy` branch and the workflow does the rest:
#   1. Auto-bumps the patch version in manifest.json (if the current
#      version already has a tag), commits the bump back to deploy.
#   2. Builds the zip via pack.sh.
#   3. Uploads it to the Chrome Web Store as a draft.
#   4. Tags the commit v<version> and creates a GitHub Release.
#
# You can override the auto-bump by manually editing manifest.json on
# develop before merging — if the version doesn't have an existing tag,
# the workflow takes it as-is (good for major/minor bumps).

on:
  push:
    branches: [deploy]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine release version
        id: version
        run: |
          set -euo pipefail
          CURRENT=$(grep -E '"version"' manifest.json | head -1 | sed -E 's/.*"version": *"([^"]+)".*/\1/')
          if git rev-parse "v$CURRENT" >/dev/null 2>&1; then
            # Tag exists — auto-bump the patch (last segment) component.
            major=$(echo "$CURRENT" | cut -d. -f1)
            minor=$(echo "$CURRENT" | cut -d. -f2)
            patch=$(echo "$CURRENT" | cut -d. -f3)
            patch=$((patch + 1))
            NEXT="$major.$minor.$patch"
            echo "Tag v$CURRENT already exists → bumping to v$NEXT"
            sed -i.bak -E 's/("version": *)"[^"]+"/\1"'"$NEXT"'"/' manifest.json
            rm manifest.json.bak
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add manifest.json
            git commit -m "Bump to v$NEXT"
            git push origin HEAD:deploy
            echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          else
            echo "Using manifest version v$CURRENT (no bump needed)"
            echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          fi

      - name: Build extension zip
        run: |
          chmod +x pack.sh
          ./pack.sh
          mv dist/woolies-protein-tags-*.zip extension.zip
          ls -lh extension.zip

      - name: Upload to Chrome Web Store (as draft)
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: extension.zip
          extension-id: ${{ secrets.CWS_EXTENSION_ID }}
          client-id: ${{ secrets.CWS_CLIENT_ID }}
          client-secret: ${{ secrets.CWS_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CWS_REFRESH_TOKEN }}
          # Keep as draft so you can eyeball the listing before submitting
          # for review. Flip to true once you trust the flow.
          publish: false

      - name: Tag + GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: extension.zip
          generate_release_notes: true
